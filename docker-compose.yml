services:
  db:
    image: pgvector/pgvector:0.8.2-pg17
    container_name: anisync-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: anisync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - anisync_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d anisync"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  anisync_pgdata: