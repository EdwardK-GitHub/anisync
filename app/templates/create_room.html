{% extends "base.html" %}
{% block title %}Create Room - AniSync{% endblock %}
{% block content %}
<section class="card narrow">
  <h1>Create an Anime Room</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/rooms/new" class="stack">
    <label>Room title</label>
    <input type="text" name="title" required />
    <button type="submit">Create Room</button>
  </form>
</section>
{% endblock %}
